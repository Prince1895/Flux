name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render free-tier from spinning down
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend API health check
        run: curl -s https://flux-yklu.onrender.com/health > /dev/null
